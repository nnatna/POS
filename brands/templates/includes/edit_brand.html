{% for brand in brands %}
<div class="modal fade" id="editBrandModal{{ brand.id }}" tabindex="-1" aria-labelledby="editBrandModalLabel{{ brand.id }}" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editBrandModalLabel{{ brand.id }}">Edit Brand</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editBrandForm{{ brand.id }}" method="post" action="{% url 'brands' %}">
          {% csrf_token %}
          <input type="hidden" name="action" value="edit">
          <input type="hidden" name="brand_id" value="{{ brand.id }}">
          <div class="mb-3">
            <label for="brandName{{ brand.id }}" class="form-label">Brand Name</label>
            <input
              type="text"
              id="brandName{{ brand.id }}"
              name="name"
              class="form-control bg-secondary-subtle"
              value="{% if open_edit_modal_id == brand.id %}{{ request.POST.name }}{% else %}{{ brand.name }}{% endif %}"
            >
          </div>
          <div class="mb-3">
            <label for="brandDescription{{ brand.id }}" class="form-label">Description</label>
            <textarea
              id="brandDescription{{ brand.id }}"
              name="description"
              rows="3"
              class="form-control bg-secondary-subtle"
            >{% if open_edit_modal_id == brand.id %}{{ request.POST.description }}{% else %}{{ brand.description }}{% endif %}</textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="editBrandForm{{ brand.id }}" class="btn btn-warning">Save Changes</button>
      </div>
    </div>
  </div>
</div>
{% endfor %}
