<div class="modal fade" id="addBrandModal" tabindex="-1" aria-labelledby="addBrandModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addBrandModalLabel">Add New Brand</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addBrandForm" method="post" action="{% url 'brands' %}">
          {% csrf_token %}
          <input type="hidden" name="action" value="add">
          <div class="mb-3">
            <label for="{{ add_form.name.id_for_label }}" class="form-label">Brand Name</label>
            {{ add_form.name }}
            {% for error in add_form.name.errors %}
              <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
          </div>
          <div class="mb-3">
            <label for="{{ add_form.description.id_for_label }}" class="form-label">Description</label>
            {{ add_form.description }}
            {% for error in add_form.description.errors %}
              <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-warning fw-medium" data-bs-dismiss="modal">Close</button>
        <button type="submit" form="addBrandForm" class="btn btn-warning fw-medium">Add Brand</button>
      </div>
    </div>
  </div>
</div>
