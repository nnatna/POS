<button type="button"
  class="card rounded mb-3 p-3  {% if selected_order_id == order.id %}
    
    
    
    bg-warning text-dark



  {% else %}
    
    
    
    bg-light text-dark



  {% endif %}"
  style="cursor: pointer;"
  onclick="selectOrder(this, 'Paid', '{{ order.order_number }}', '{{ order.id }}')">
  <div class="d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
      <h6 class="fw-bold mb-0">Order #{{ order.order_number }}</h6>
      <span class="badge bg-secondary">{{ order.created_at|date:'M d, Y H:i' }}</span>
    </div>
    <small class="status-text badge bg-success text-white fw-medium">
      Paid
    </small>
  </div>
  <div class="d-flex justify-content-between align-items-end mt-2">
    <small class="info-text d-flex align-items-center gap-2{% if selected_order_id == order.id %}
        
        
        
        opacity-75



      {% else %}
        
        
        
        text-muted



      {% endif %}">
      Total items : {{ order.total_items|default:0 }}
      Paid by : <small class="status-text text-uppercase badge bg-danger text-white fw-medium">{{ order.sale_set.first.payment_method|default:"N/A" }}</small>
    </small>
    
     
    <h5 class="fw-bold mb-0 price-text text-danger">${{ order.total_amount|default:0|floatformat:2 }}</h5>
  </div>
</button>
