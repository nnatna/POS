<div class="col-3 col-md-2 col-lg-2 col-xl-2 mb-4 product-item" data-category="{{ product.category.id }}">
  <div class="card shadow-sm h-100 w-100" style="overflow: hidden;">
    {% if product.image %}
      <div class="d-flex align-items-center justify-content-center" style="height: 160px;  overflow: hidden;">
        <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}" style="height: 160px; width: 160px; object-fit: cover;" />
      </div>
    {% else %}
      <div class="bg-secondary text-white d-flex align-items-center justify-content-center" style="height: 160px;">
        <i class="fa-solid fa-image fa-2x"></i>
      </div>
    {% endif %}

    <div class="card-body d-flex flex-column">
      <p class="text-uppercase text-muted mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">{{ product.brand.name }}</p>
      <h6 class="card-title text-truncate" title="{{ product.name }}">{{ product.name }}</h6>

      <p class="card-text text-muted small mb-2">
        <i class="fa-solid fa-tag me-1" style="font-size: 0.8em;"></i>{{ product.category.name }}
    </p>

      <div class="mt-auto d-flex justify-content-between align-items-center">
        <span class="fw-bold text-danger">${{ product.price|floatformat:2 }}</span>

        <button type="button" class="btn btn-outline-warning rounded-circle add-to-cart" data-id="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price }}" data-image="{% if product.image %}{{ product.image.url }}{% endif %}"><i class="fa-solid fa-cart-plus"></i></button>
      </div>
    </div>
  </div>
</div>
