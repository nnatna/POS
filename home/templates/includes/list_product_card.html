<div class="col-6 col-md-4 col-lg-3 col-xl-2 py-1 product-item"
     data-category="{{ product.category.id }}"
     data-product-name="{{ product.name|lower }}">
  <div class="card product-card shadow-sm bg-light h-100 w-100 overflow-hidden">
    {% if product.image %}
      <div class="product-card-media d-flex align-items-center justify-content-center">
        <img src="{{ product.image.url }}" class="card-img-top product-card-img" alt="{{ product.name }}" />
      </div>
    {% else %}
      <div class="product-card-placeholder text-white d-flex align-items-center justify-content-center">
        <i class="fa-solid fa-image fa-2x"></i>
      </div>
    {% endif %}

    <div class="card-body p-3 d-flex flex-column">
      <p class="product-card-brand text-uppercase text-muted mb-1">{{ product.brand.name }}</p>
      <h6 class="card-title product-card-title mb-0" title="{{ product.name }}">{{ product.name }}</h6>

      <p class="card-text product-card-category text-muted small mb-1">
        <i class="fa-solid fa-tag me-1"></i>{{ product.category.name }}
      </p>

      <div class="mt-auto d-flex justify-content-between align-items-center gap-2">
        <span class="product-card-price fw-bold text-danger">
          {% if product.discount > 0 %}
            ${{ product.discounted_price|floatformat:2 }}
            <small class="text-muted text-decoration-line-through ms-1">${{ product.price|floatformat:2 }}</small>
          {% else %}
            ${{ product.price|floatformat:2 }}
          {% endif %}
        </span>

        <button type="button" class="btn btn-outline-warning rounded-circle add-to-cart product-card-action d-inline-flex align-items-center justify-content-center flex-shrink-0 border-2" data-id="{{ product.id }}" data-name="{{ product.name }}" data-price="{{ product.price }}" data-discount="{{ product.discount }}" data-image="{% if product.image %}{{ product.image.url }}{% endif %}">
          <i class="fa-solid fa-cart-plus"></i>
        </button>
      </div>
    </div>
  </div>
</div>
