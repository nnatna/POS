<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addCategoryModalLabel">Add New Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addCategoryForm" method="post" action="{% url 'category' %}">
          {% csrf_token %}
          <input type="hidden" name="action" value="add">
          <div class="mb-3">
            <label for="{{ add_form.name.id_for_label }}" class="form-label">Category Name</label>
            {{ add_form.name }}
            {% for error in add_form.name.errors %}
              <div class="text-danger small mt-1">{{ error }}</div>
            {% endfor %}
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-warning fw-medium" data-bs-dismiss="modal">Close</button>
        <button type="submit" form="addCategoryForm" class="btn btn-warning fw-medium">Add Category</button>
      </div>
    </div>
  </div>
</div>
