{% for category in categories %}
<div class="modal fade" id="editCategoryModal{{ category.id }}" tabindex="-1" aria-labelledby="editCategoryModalLabel{{ category.id }}" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editCategoryModalLabel{{ category.id }}">Edit Category</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editCategoryForm{{ category.id }}" method="post" action="{% url 'category' %}">
          {% csrf_token %}
          <input type="hidden" name="action" value="edit">
          <input type="hidden" name="category_id" value="{{ category.id }}">
          <div class="mb-3">
            <label for="categoryName{{ category.id }}" class="form-label">Category Name</label>
            <input
              type="text"
              id="categoryName{{ category.id }}"
              name="name"
              class="form-control bg-secondary-subtle"
              value="{% if open_edit_modal_id == category.id %}{{ request.POST.name }}{% else %}{{ category.name }}{% endif %}"
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="editCategoryForm{{ category.id }}" class="btn btn-warning">Save Changes</button>
      </div>
    </div>
  </div>
</div>
{% endfor %}
