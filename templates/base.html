{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS</title>
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{% static 'styles/include.css' %}?v=4" />
    <link rel="stylesheet" href="{% static 'styles/home.css' %}?v=3" />
  </head>

  <body>
    {% if user.is_authenticated %}
      <div class="d-flex w-100 vh-100 overflow-hidden" id="wrapper">
        <aside class="border-end bg-light flex-shrink-0" style="min-width: 250px;">
          {% include 'includes/sidebar.html' %}
        </aside>

        <div class="app-shell d-flex flex-grow-1 w-100 overflow-hidden">
          <div class="content flex-grow-1 d-flex flex-column w-100">
            <nav class="flex-shrink-0">
              {% include 'includes/navbar.html' %}
            </nav>

            <main class="flex-grow-1 w-100 overflow-y-auto">
              {% block content %}

              {% endblock %}
            </main>
          </div>

          {% block sidebar_order %}

          {% endblock %}
        </div>
      </div>
    {% endif %}
    {% block script %}
      <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
      <script src="{% static 'fontawesome/js/all.min.js' %}"></script>
      <script src="{% static 'javascripts/card.js' %}"></script>
      <script src="{% static 'javascripts/include.js' %}"></script>
      <script src="{% static 'javascripts/filter.js' %}"></script>
      <script src="{% static 'javascripts/sales.js' %}"></script>
      <script src="{% static 'javascripts/process_checkout.js' %}?t={% now 'U' %}"></script>
      <script>
        console.log('Js is running!')
      </script>
    {% endblock %}
  </body>
</html>
