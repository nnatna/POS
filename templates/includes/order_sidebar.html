<div class="d-flex flex-column h-100 bg-white">
    <div class="p-3 border-bottom bg-white flex-shrink-0">
        <p class="mb-0 fw-bold">Selected Product</p>
    </div>

    <div id="order-items" class="flex-grow-1 overflow-y-auto p-3">
        <p class="text-muted text-center mt-3 small">No items yet</p>
    </div>

    <div class="border-top p-3 bg-white flex-shrink-0">
        <div class="d-flex justify-content-between mb-1">
            <span>Subtotal:</span>
            <span id="cart-total">$0.00</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <span>Discount:</span>
            <span id="discount-value">$0.00</span>
        </div>
        <div class="d-flex justify-content-between mb-1">
            <span>Total Item:</span>
            <span id="total-items-value">0</span>
        </div>
        <div class="d-flex justify-content-between fw-bold mb-3">
            <span>Total Amount:</span>
            <span class="text-danger" id="total-value">$0.00</span>
        </div>
        <button type="button" id="checkout-btn" class="btn btn-warning w-100 fw-medium py-2" data-bs-toggle="modal" data-bs-target="#exampleModal">Checkout</button>
    </div>
</div>
