<div class="d-flex flex-column h-100 bg-white">
  <div class="p-4 border-bottom">
    {% if user.is_authenticated %}
      <small class="text-uppercase text-secondary d-block mb-1" style="font-size: 0.7rem; letter-spacing: 1px;">Logged in as</small>
      <h5 class="fw-bold mb-2">{{ user.get_full_name|default:user.username }}</h5>
      <span class="badge py-2 px-1 {% if user.is_staff or user.is_superuser %}bg-danger {% else %}bg-info {% endif %}bg-opacity-75">
        <i class="fa-solid fa-shield-halved"></i>
        {{ user_profile.position|default:"Staff" }}
      </span>
    {% endif %}
  </div>

  <ul class="nav nav-pills flex-column gap-1 p-3 sidebar-menu flex-grow-1" id="sidebarNav">
    <li class="nav-item">
      <a href="{% url 'home' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'home' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-house me-2"></i>Home
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'dashboard' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'dashboard' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-chart-line me-2"></i>Dashboard
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'product' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'product' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-box-archive me-2"></i>Product
      </a>
      </li>
      <li class="nav-item">
      <a href="{% url 'brands' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'brands' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-tag me-2"></i>Brand
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'category' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'category' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-layer-group me-2"></i>Category
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'sales' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'sales' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-cart-shopping me-2"></i>Sales
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'report' %}" class="nav-link py-2 px-3
      {% if request.resolver_match.url_name == 'report' %} fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-chart-column me-2"></i>Report
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'settings' %}" class="nav-link py-2 px-3 
      {% if request.path_info|slice:':9' == '/settings' %}fw-medium bg-warning active{% endif %}">
        <i class="fa-solid fa-gear me-2"></i>Settings
      </a>
    </li>
  </ul>

  <div class="p-3 mt-auto">
    <form action="{% url 'logout' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-outline-danger w-100 py-2">
        <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
      </button>
    </form>
  </div>
</div>
